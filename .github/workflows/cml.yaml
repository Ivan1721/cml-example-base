name: model-training

on:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc
          pip install "dvc[gdrive]"
          pip install -r requirements.txt

      - name: Pull data from DVC remote
        run: |
          dvc pull
      - name: Configure DVC Google Drive service account
          env:
            GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          run: |
            mkdir -p .dvc/tmp
            echo "$GDRIVE_CREDENTIALS_DATA" > .dvc/tmp/gdrive-service-account.json
            dvc remote modify --local gdriveremote gdrive_use_service_account true
            dvc remote modify --local gdriveremote gdrive_service_account_json_file_path .dvc/tmp/gdrive-service-account.json

      - name: Train model
        run: |
          python train.py

      - name: Create CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model training report" > report.md
          echo "" >> report.md
          echo "### Metrics" >> report.md
          cat metrics.txt >> report.md
          echo "" >> report.md
          echo "### Confusion Matrix" >> report.md
          echo "![](./plot.png)" >> report.md
          cml comment create report.md